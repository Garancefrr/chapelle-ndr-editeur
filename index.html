<style id="inline-tokens">
/* Shared tokens for all 3 directions */

/* Direction A — Pierre & Encre */
:root {
  --a-navy: #16243f;
  --a-navy-deep: #0d1929;
  --a-stone: #c4a876;
  --a-stone-light: #e7dac2;
  --a-cream: #f4efe6;
  --a-ink: #1c1a16;
  --a-paper: #fbf8f1;
}

/* Direction B — Arc Gothique */
:root {
  --b-navy: #0f1f3d;
  --b-navy-deep: #081326;
  --b-terra: #c25a3a;
  --b-terra-deep: #9a4329;
  --b-cream: #f2ede3;
  --b-paper: #faf6ec;
  --b-ink: #15110c;
}

/* Direction C — Manuscrit */
:root {
  --c-navy: #1a2a4f;
  --c-navy-deep: #0e1a36;
  --c-gold: #b8893e;
  --c-gold-light: #d8b773;
  --c-ivory: #f8f2e4;
  --c-parchment: #efe5cf;
  --c-ink: #2a1f10;
}

/* Reset for slide-like artboards */
.ig-board, .ig-board * { box-sizing: border-box; }
.ig-board { position: relative; overflow: hidden; width: 100%; height: 100%; }

/* Type families */
.f-cormorant { font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif; }
.f-bodoni    { font-family: "Bodoni Moda", "Didot", "Times New Roman", serif; }
.f-spectral  { font-family: "Spectral", "EB Garamond", Georgia, serif; }
.f-inter     { font-family: "Inter", -apple-system, system-ui, sans-serif; }
.f-manrope   { font-family: "Manrope", "Inter", -apple-system, system-ui, sans-serif; }

/* Utilities */
.fill { position: absolute; inset: 0; }
.flex { display: flex; }
.col  { display: flex; flex-direction: column; }
.center { display: flex; align-items: center; justify-content: center; }
.tt-uppercase { text-transform: uppercase; }

/* Decorative tracking */
.tr-wide  { letter-spacing: 0.18em; }
.tr-xwide { letter-spacing: 0.32em; }
.tr-tight { letter-spacing: -0.015em; }

/* Caps with spacing helper */
.label {
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-weight: 500;
}

<style>
  :root {
    --ui-bg: #faf6ec;
    --ui-panel: #fff;
    --ui-ink: #0f1f3d;
    --ui-terra: #c25a3a;
    --ui-line: rgba(15,31,61,0.10);
    --ui-line-strong: rgba(15,31,61,0.2);
    --ui-muted: rgba(15,31,61,0.55);
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--ui-bg);
    color: var(--ui-ink);
    height: 100%;
    font-family: "Inter", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: grid;
    grid-template-columns: 400px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
    overflow: hidden;
  }
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
    background: #fff;
    border-bottom: 1px solid var(--ui-line);
  }
  header .title { font-family: "Bodoni Moda", serif; font-size: 19px; font-weight: 500; }
  header .title em { font-style: italic; color: var(--ui-terra); }
  header .actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    border: 1px solid var(--ui-ink); background: var(--ui-ink); color: #fff;
    font-family: inherit; font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 9px 14px; cursor: pointer;
    transition: opacity 0.15s, transform 0.05s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: wait; }
  .btn.ghost { background: #fff; color: var(--ui-ink); }
  .btn.terra { background: var(--ui-terra); border-color: var(--ui-terra); }
  .btn.tiny { font-size: 10px; padding: 5px 9px; letter-spacing: 0.06em; }

  /* ── Loading overlay ────────────────────────────────── */
  #loading {
    position: fixed; inset: 0; background: var(--ui-bg);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  #loading.hidden { display: none; }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--ui-line-strong); border-top-color: var(--ui-terra);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .msg { font-size: 12px; color: var(--ui-muted); letter-spacing: 0.04em; }

  /* ── Sidebar ───────────────────────────────────────── */
  aside {
    background: #fff;
    border-right: 1px solid var(--ui-line);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .tabs {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--ui-line);
    position: sticky; top: 0; background: #fff; z-index: 2;
  }
  .tab {
    padding: 14px 2px;
    text-align: center;
    cursor: pointer;
    font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ui-muted);
    border-bottom: 2px solid transparent;
    transition: color 0.12s, border-color 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tab:hover { color: var(--ui-ink); }
  .tab.active { color: var(--ui-terra); border-bottom-color: var(--ui-terra); }

  .form { padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ui-muted);
  }
  .field input[type="text"],
  .field input[type="number"],
  .field textarea {
    font: inherit; font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--ui-line-strong);
    background: #fff; color: var(--ui-ink);
    border-radius: 0;
    width: 100%; box-sizing: border-box;
    transition: border-color 0.12s;
  }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--ui-terra);
  }
  .field textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .char-counter {
    font-size: 10px; letter-spacing: 0.05em;
    text-align: right;
    margin-top: 2px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 70px 1fr 80px; gap: 8px; align-items: end; }
  .field-row-4 { display: grid; grid-template-columns: 60px 1fr 1fr 80px; gap: 8px; align-items: end; }

  .section-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ui-ink);
    margin-top: 6px; margin-bottom: -2px;
    display: flex; justify-content: space-between; align-items: center;
  }
  hr.sep { border: 0; border-top: 1px solid var(--ui-line); margin: 4px 0; }

  /* Photo upload */
  .photo-pick {
    border: 1px dashed var(--ui-line-strong);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    font-size: 12px; color: var(--ui-muted);
  }
  .photo-pick:hover { border-color: var(--ui-terra); color: var(--ui-ink); }
  .photo-pick.has-photo { border-style: solid; padding: 8px; }
  .photo-pick.has-photo img {
    max-width: 100%; max-height: 80px; display: block; margin: 0 auto;
  }
  .photo-actions { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row input[type="range"] { flex: 1; min-width: 0; }
  .slider-row .num-input {
    font: inherit; font-size: 13px;
    width: 56px; padding: 8px 8px;
    border: 1px solid var(--ui-line-strong); background: #fff;
    color: var(--ui-ink);
    -moz-appearance: textfield;
    text-align: right;
  }
  .slider-row .num-input:focus { outline: none; border-color: var(--ui-terra); }
  .slider-row .num-input::-webkit-outer-spin-button,
  .slider-row .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .slider-row .num-suffix {
    font-size: 13px; color: var(--ui-muted); font-weight: 500;
    margin-left: -2px;
  }

  /* ── Preview area ──────────────────────────────────── */
  main {
    overflow: auto;
    padding: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage {
    box-shadow: 0 14px 50px rgba(15,31,61,0.16);
    background: #fff;
    overflow: hidden;
    position: relative;
    transition: width 0.2s, height 0.2s;
  }
  .stage > div {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
  }
  .meta {
    font-size: 11px; color: var(--ui-muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; gap: 18px;
  }
  .meta strong { color: var(--ui-ink); font-weight: 600; }
  .status { font-size: 11px; color: var(--ui-muted); }
  .status.ok { color: #2d7a4f; }
  .status.err { color: #c0392b; }

  /* Hidden export stage at native res */
  #export-stage {
    position: fixed; top: 0; left: 0; pointer-events: none;
    z-index: -1; opacity: 0;
  }
</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="msg" id="loading-msg">Chargement des polices…</div>
</div>

<header>
  <div class="title">Notre-Dame <em>de Réconciliation</em> · Éditeur Instagram</div>
  <div class="actions">
    <span class="status" id="status"></span>
    <button class="btn ghost" id="btn-reset" title="Réinitialiser le post courant">↺ Réinitialiser</button>
    <button class="btn terra" id="btn-download">↓ Télécharger PNG</button>
  </div>
</header>

<aside>
  <div class="tabs" id="tabs"></div>
  <div class="form" id="form"></div>
</aside>

<main>
  <div class="stage-wrap">
    <div class="stage" id="stage"><div id="stage-inner"></div></div>
    <div class="meta">
      <span><strong id="m-name"></strong></span>
      <span>Export : <strong id="m-dim"></strong></span>
    </div>
    <div id="page-nav" style="display:none;gap:8px;margin-top:4px;"></div>
  </div>
</main>

<div id="export-stage"></div>
